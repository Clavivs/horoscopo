name: Update Horoscope Daily

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # HEMOS QUITADO LA LÍNEA DEL CACHE PARA EVITAR EL ERROR

      - name: Install dependencies
        run: npm install # Esto leerá el package.json que creamos arriba

      - name: Run update script with Retries
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          n=0
          until [ "$n" -ge 3 ]
          do
             node update.js && break
             n=$((n+1))
             echo "La API falló o está saturada. Reintento $n de 3 en 60 segundos..."
             sleep 60
          done
          if [ $n -ge 3 ]; then
            echo "El script falló tras 3 intentos."
            exit 1
          fi
