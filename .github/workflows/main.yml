name: Update Horoscope Daily

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install @google/generative-ai

      - name: Run update script with Retries
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # Intentará ejecutar el script. Si falla, espera 60s y repite (máx 3 veces)
        run: |
          n=0
          until [ "$n" -ge 3 ]
          do
             node update.js && break
             n=$((n+1))
             echo "La API falló o está saturada. Reintento $n de 3 en 60 segundos..."
             sleep 60
          done
          if [ $n -ge 3 ]; then
            echo "El script falló tras 3 intentos."
            exit 1
          fi

      - name: Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # El script update.js ya tiene la lógica de git add/commit/push
          # así que aquí solo nos aseguramos de que no rompa el flujo.
