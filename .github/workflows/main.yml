name: Actualizar Horóscopo Diario

on:
  schedule:
    # Se ejecuta todos los días a las 06:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install openai
          # Si tienes un package.json, usa 'npm install' a secas
          # Pero forzamos openai por si acaso no está en el repo.

      - name: Run update script
        env:
          # IMPORTANTE: Asegúrate de que el nombre coincida 
          # con el que pusiste en Settings > Secrets del repo
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: node update.js

      - name: Push changes
        run: |
          # El script ya hace el push, pero nos aseguramos de que
          # la sesión de git tenga permisos.
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
